    const svgPrev = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>`;
    const svgNext = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>`;
    const svgPlay = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const svgPause = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
    const svgHeartOutline = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    const svgHeartFilled = `<svg viewBox="0 0 24 24" fill="#333" stroke="#333" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

    function createAppElement(app) { 
        return `<div class="grid-item app" onclick="openApp('${app.appId}', '${app.name}')">
                    <img src="${app.icon}"> 
                    <span class="app-name">${app.name}</span>
                </div>`; 
    }

    function createPolaroidWidgetElement() { return `<div class="grid-item widget-polaroid" onclick="openWidgetModal(this, 'polaroid')"><div class="polaroid-box"><div class="polaroid p1"><div class="tape"></div><img src="${polaroidData[0].img}"></div><div class="polaroid p2"><div class="tape"></div><img src="${polaroidData[1].img}"></div><div class="polaroid p3"><div class="tape"></div><img src="${polaroidData[2].img}"></div></div><span class="widget-label">widgy</span></div>`; }
    function createDouyinWidgetElement() { return `<div class="grid-item widget-douyin" onclick="openWidgetModal(this, 'douyin')"><div class="douyin-box"><div class="dy-avatar-wrapper"><div class="dy-bubble">${douyinData.text}</div><div class="dy-ring"><img src="${douyinData.img}" class="dy-avatar"><div class="dy-plus">+</div></div></div></div><span class="widget-label">widgy</span></div>`; }
    function createRecordWidgetElement() { return `<div class="grid-item widget-record" onclick="openWidgetModal(this, 'record')"><div class="record-box"><div class="re-vinyl"><img src="${recordData.vinylImg}" class="re-vinyl-cover"><div class="re-vinyl-hole"></div></div><div class="re-polaroid"><img src="${recordData.polaroidImg}" class="re-photo"><div class="re-star rs1">✦</div><div class="re-star rs2">✧</div><div class="re-star rs3">✦</div><div class="re-star rs4">✧</div><div class="re-star rs5">✦</div></div></div><span class="widget-label">widgy</span></div>`; }
    function createMusicWidgetElement() {
        return `
            <div class="grid-item widget-music" onclick="openWidgetModal(this, 'music')">
                <div class="music-box-wrap">
                    <div class="music-box">
                        <div class="mu-left"><div class="mu-vinyl-wrapper"><div class="mu-vinyl" id="mu-vinyl"><img src="${musicData.img}" class="mu-vinyl-cover"><div class="mu-vinyl-hole"></div></div><div class="mu-stylus" id="mu-stylus"><div class="mu-stylus-pivot"></div><div class="mu-stylus-arm"><div class="mu-stylus-head"></div></div></div></div></div>
                        <div class="mu-right">
                            <div class="mu-info"><div class="mu-title">${musicData.title}</div><div class="mu-artist">${musicData.artist}</div></div>
                            <div class="mu-lyrics"><div class="mu-lyrics-inner" id="mu-lyrics"><p>你真的忘了我吗</p><p>还是你假装傻</p><p>我真的忘了你吗</p><p>还是我还在挣扎</p><p>如果真的忘了我</p><p>怎么还会痛</p></div></div>
                            <div class="mu-controls" onclick="event.stopPropagation()">
                                <div class="mu-btn" id="btn-loop" onclick="toggleLoop()">${musicData.isLoop ? svgLoopOne : svgLoop}</div>
                                <div class="mu-btn">${svgPrev}</div>
                                <div class="mu-btn play" id="btn-play" onclick="togglePlay()">${musicData.isPlaying ? svgPause : svgPlay}</div>
                                <div class="mu-btn">${svgNext}</div>
                                <div class="mu-btn" id="btn-heart" onclick="toggleHeart()">${musicData.isLiked ? svgHeartFilled : svgHeartOutline}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <span class="widget-label">widgy</span>
            </div>`;
    }

    function render() {
        document.getElementById('dock-container').innerHTML = dockAppsData.map(createAppElement).join('');
        const pagesContainer = document.getElementById('pages-container');
        const page1 = document.createElement('div');
        page1.className = 'page';
        page1.innerHTML += createPolaroidWidgetElement() + createDouyinWidgetElement() + homeAppsData.slice(0, 4).map(createAppElement).join('') + homeAppsData.slice(4, 6).map(createAppElement).join('') + createRecordWidgetElement() + homeAppsData.slice(6, 8).map(createAppElement).join(''); 
        pagesContainer.appendChild(page1);

        if(homeAppsData.length > 8) {
            const page2 = document.createElement('div');
            page2.className = 'page';
            page2.innerHTML += createMusicWidgetElement() + homeAppsData.slice(8).map(createAppElement).join('');
            pagesContainer.appendChild(page2);
        }
    }
    render();

    function togglePlay() { musicData.isPlaying = !musicData.isPlaying; document.getElementById('btn-play').innerHTML = musicData.isPlaying ? svgPause : svgPlay; const vinyl = document.getElementById('mu-vinyl'); const stylus = document.getElementById('mu-stylus'); const lyrics = document.getElementById('mu-lyrics'); if(musicData.isPlaying) { vinyl.classList.remove('paused'); stylus.classList.remove('paused'); lyrics.classList.remove('paused'); } else { vinyl.classList.add('paused'); stylus.classList.add('paused'); lyrics.classList.add('paused'); } }
    function toggleHeart() { musicData.isLiked = !musicData.isLiked; document.getElementById('btn-heart').innerHTML = musicData.isLiked ? svgHeartFilled : svgHeartOutline; }
    function toggleLoop() { musicData.isLoop = !musicData.isLoop; document.getElementById('btn-loop').innerHTML = musicData.isLoop ? svgLoopOne : svgLoop; }

    let currentEditingWidget = null; let currentWidgetType = ''; const modalOverlay = document.getElementById('modal-overlay');

    function openWidgetModal(element, type) {
        currentEditingWidget = element; currentWidgetType = type;
        const modalContent = document.querySelector('.modal-content'); const modalHeader = document.querySelector('.modal-header'); modalContent.innerHTML = ''; 

        if (type === 'polaroid') {
            modalHeader.innerText = '编辑拍立得组件';
            for(let i=0; i<3; i++) { modalContent.innerHTML += `<div class="edit-card"><h4>照片 ${i + 1}</h4><div class="input-group"><label>URL:</label><input type="text" id="img-url-${i}" value="${polaroidData[i].img}"></div><div class="input-group file-upload"><label>或相册:</label><input type="file" accept="image/*" onchange="previewLocalImage(this, ${i})"></div></div>`; }
        } else if (type === 'douyin') {
            modalHeader.innerText = '编辑状态组件';
            modalContent.innerHTML += `<div class="edit-card"><h4>状态设置</h4><div class="input-group"><label>气泡文字:</label><input type="text" id="dy-text" value="${douyinData.text}" maxlength="12"></div><div class="input-group"><label>URL:</label><input type="text" id="dy-img-url" value="${douyinData.img}"></div><div class="input-group file-upload"><label>或相册:</label><input type="file" accept="image/*" onchange="previewLocalImage(this, 0)"></div></div>`;
        } else if (type === 'record') {
            modalHeader.innerText = '编辑黑胶星空组件';
            modalContent.innerHTML += `<div class="edit-card"><h4>拍立得图片</h4><div class="input-group"><label>URL:</label><input type="text" id="re-polaroid-url" value="${recordData.polaroidImg}"></div><div class="input-group file-upload"><label>或相册:</label><input type="file" accept="image/*" onchange="previewLocalImage(this, 0)"></div></div><div class="edit-card"><h4>唱片封面</h4><div class="input-group"><label>URL:</label><input type="text" id="re-vinyl-url" value="${recordData.vinylImg}"></div><div class="input-group file-upload"><label>或相册:</label><input type="file" accept="image/*" onchange="previewLocalImage(this, 1)"></div></div>`;
        } else if (type === 'music') {
            modalHeader.innerText = '编辑音乐组件';
            modalContent.innerHTML += `<div class="edit-card"><h4>音乐信息</h4><div class="input-group"><label>歌名:</label><input type="text" id="mu-title-input" value="${musicData.title}" maxlength="15"></div><div class="input-group"><label>歌手:</label><input type="text" id="mu-artist-input" value="${musicData.artist}" maxlength="15"></div><div class="input-group"><label>封面URL:</label><input type="text" id="mu-cover-url" value="${musicData.img}"></div><div class="input-group file-upload"><label>或封面:</label><input type="file" accept="image/*" onchange="previewLocalImage(this, 0)"></div></div>`;
        }
        modalOverlay.classList.add('active');
    }

    function closeModal() { modalOverlay.classList.remove('active'); currentEditingWidget = null; currentWidgetType = ''; }
    let tempImages = [null, null, null];
    function previewLocalImage(input, index) { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = function(e) { tempImages[index] = e.target.result; let urlInputId = ''; if (currentWidgetType === 'polaroid') urlInputId = `img-url-${index}`; else if (currentWidgetType === 'douyin') urlInputId = 'dy-img-url'; else if (currentWidgetType === 'record') urlInputId = index === 0 ? 're-polaroid-url' : 're-vinyl-url'; else if (currentWidgetType === 'music') urlInputId = 'mu-cover-url'; document.getElementById(urlInputId).value = "(已选择本地图片)"; }; reader.readAsDataURL(file); } }
    function saveWidget() {
        if (!currentEditingWidget) return;
        if (currentWidgetType === 'polaroid') { for(let i=0; i<3; i++) { const urlValue = document.getElementById(`img-url-${i}`).value; if (tempImages[i] && urlValue === "(已选择本地图片)") polaroidData[i].img = tempImages[i]; else if (urlValue !== "(已选择本地图片)") polaroidData[i].img = urlValue; currentEditingWidget.querySelector(`.p${i+1} img`).src = polaroidData[i].img; } } else if (currentWidgetType === 'douyin') { douyinData.text = document.getElementById('dy-text').value; const urlValue = document.getElementById('dy-img-url').value; if (tempImages[0] && urlValue === "(已选择本地图片)") douyinData.img = tempImages[0]; else if (urlValue !== "(已选择本地图片)") douyinData.img = urlValue; currentEditingWidget.querySelector('.dy-bubble').innerText = douyinData.text; currentEditingWidget.querySelector('.dy-avatar').src = douyinData.img; } else if (currentWidgetType === 'record') { const pUrlValue = document.getElementById('re-polaroid-url').value; const vUrlValue = document.getElementById('re-vinyl-url').value; if (tempImages[0] && pUrlValue === "(已选择本地图片)") recordData.polaroidImg = tempImages[0]; else if (pUrlValue !== "(已选择本地图片)") recordData.polaroidImg = pUrlValue; if (tempImages[1] && vUrlValue === "(已选择本地图片)") recordData.vinylImg = tempImages[1]; else if (vUrlValue !== "(已选择本地图片)") recordData.vinylImg = vUrlValue; currentEditingWidget.querySelector('.re-photo').src = recordData.polaroidImg; currentEditingWidget.querySelector('.re-vinyl-cover').src = recordData.vinylImg; } else if (currentWidgetType === 'music') { musicData.title = document.getElementById('mu-title-input').value; musicData.artist = document.getElementById('mu-artist-input').value; const urlValue = document.getElementById('mu-cover-url').value; if (tempImages[0] && urlValue === "(已选择本地图片)") musicData.img = tempImages[0]; else if (urlValue !== "(已选择本地图片)") musicData.img = urlValue; currentEditingWidget.querySelector('.mu-title').innerText = musicData.title; currentEditingWidget.querySelector('.mu-artist').innerText = musicData.artist; currentEditingWidget.querySelector('.mu-vinyl-cover').src = musicData.img; }
        tempImages = [null, null, null]; closeModal();
    }
</script>
</body>
</html>
